<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Constella logo</title>
  <desc id="desc">A dark blue galaxy mark with the Virgo constellation drawn using seven-point stars.</desc>
  <defs>
    <radialGradient id="sky" cx="48%" cy="38%" r="82%">
      <stop offset="0%" stop-color="#263b8f"/>
      <stop offset="36%" stop-color="#121f57"/>
      <stop offset="72%" stop-color="#070f2f"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <radialGradient id="milkyway" cx="38%" cy="42%" r="76%" gradientTransform="rotate(-28 .38 .42) scale(1 .42)">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.42"/>
      <stop offset="30%" stop-color="#7dd3fc" stop-opacity="0.18"/>
      <stop offset="66%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="56" y1="76" x2="200" y2="184" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="48%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="starFill" x1="58" y1="66" x2="194" y2="187" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="46%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.21 0 0 0 0 0.58 0 0 0 0 0.98 0 0 0 0.72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="heptastar">
      <path d="M0-11 2.6-3.2 9.5-6.9 5.7-.1 11 5.8 3.1 3.7 1.9 11-2.4 4.4-9.5 6.9-4.8.5-8.6-5.8-1.5-3.8Z"/>
    </g>
  </defs>

  <rect width="256" height="256" rx="52" fill="url(#sky)"/>
  <rect width="256" height="256" rx="52" fill="url(#milkyway)" opacity="0.9"/>
  <path d="M31 166C65 118 88 108 126 99c43-10 73-30 102-72" fill="none" stroke="#e0f2fe" stroke-width="18" stroke-linecap="round" opacity="0.05"/>
  <path d="M27 176C66 129 95 114 130 104c42-12 68-34 101-76" fill="none" stroke="#7dd3fc" stroke-width="8" stroke-linecap="round" opacity="0.08"/>

  <g fill="#dbeafe" opacity="0.75">
    <circle cx="44" cy="47" r="1.5"/>
    <circle cx="82" cy="37" r="1.1"/>
    <circle cx="112" cy="55" r="1.3"/>
    <circle cx="184" cy="48" r="1.4"/>
    <circle cx="213" cy="83" r="1.1"/>
    <circle cx="42" cy="122" r="1.2"/>
    <circle cx="220" cy="166" r="1.5"/>
    <circle cx="54" cy="211" r="1.3"/>
    <circle cx="118" cy="216" r="1.1"/>
    <circle cx="205" cy="214" r="1.2"/>
  </g>

  <g fill="none" stroke="url(#line)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.86" filter="url(#softGlow)">
    <path d="M55 143 98 153 121 177 145 133 158 97 171 39"/>
    <path d="M121 177 80 193"/>
    <path d="M145 133 192 114 207 76"/>
  </g>

  <g fill="url(#starFill)" stroke="#eff6ff" stroke-width="1" filter="url(#softGlow)">
    <use href="#heptastar" transform="translate(55 143) scale(0.48)"/>
    <use href="#heptastar" transform="translate(98 153) scale(0.42)"/>
    <use href="#heptastar" transform="translate(121 177) scale(0.58)"/>
    <use href="#heptastar" transform="translate(80 193) scale(0.42)"/>
    <use href="#heptastar" transform="translate(145 133) scale(0.5)"/>
    <use href="#heptastar" transform="translate(158 97) scale(0.48)"/>
    <use href="#heptastar" transform="translate(171 39) scale(0.42)"/>
    <use href="#heptastar" transform="translate(192 114) scale(0.46)"/>
    <use href="#heptastar" transform="translate(207 76) scale(0.42)"/>
  </g>
</svg>
