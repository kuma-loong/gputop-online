<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constella</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg?v=20260627" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <a class="brand-mark" href="/overview" aria-label="Constella overview"><img class="brand-logo" src="/logo.svg?v=20260627" alt="" /></a>
          <div>
            <h1><a href="/overview">Constella</a></h1>
            <p id="nodeLine">waiting for snapshot</p>
          </div>
        </div>
        <div class="status-cluster">
          <div id="refreshControl" class="refresh-control" role="group" aria-label="Refresh interval"></div>
          <span id="liveState" class="live-pill is-pending">
            <span></span>
            connecting
          </span>
          <button id="pauseButton" class="icon-button" type="button" aria-label="Pause stream" title="Pause stream">
            <i data-lucide="pause"></i>
          </button>
          <button id="refreshButton" class="icon-button" type="button" aria-label="Refresh snapshot" title="Refresh snapshot">
            <i data-lucide="refresh-cw"></i>
          </button>
        </div>
      </header>

      <main class="shell">
        <section class="summary-grid" id="summaryGrid"></section>
        <section class="fabric-band" id="fabricBand"></section>
        <section class="gpu-grid" id="gpuGrid"></section>
        <section class="process-section" id="processSection">
          <div class="section-head">
            <h2>Tasks</h2>
            <span id="processMeta"></span>
          </div>
          <div class="process-table-wrap">
            <table class="process-table">
              <thead>
                <tr>
                  <th>Node</th>
                  <th>GPU</th>
                  <th>User</th>
                  <th>PID</th>
                  <th>Task</th>
                  <th>Memory</th>
                  <th>Runtime</th>
                  <th>Type</th>
                </tr>
              </thead>
              <tbody id="processRows">
                <tr>
                  <td colspan="8" class="empty">waiting for tasks</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
